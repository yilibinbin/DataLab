name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project + test stack
        run: |
          python -m pip install --upgrade pip
          # Both frontends are exercised by the suite (96 Qt files, 44 Flask
          # files); units/mcmc back a handful of optional-path tests.
          python -m pip install -e ".[desktop,web,units,mcmc,test]"

      - name: Run tests
        env:
          # Qt tests need an offscreen platform on headless CI; a random web
          # secret lets the Flask app boot without DATALAB_WEB_SECRET set.
          QT_QPA_PLATFORM: offscreen
          DATALAB_DEBUG: "1"
        run: pytest -q

  lint:
    name: Lint + type-check
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint + typing stack
        run: |
          python -m pip install --upgrade pip
          # mypy --strict on the core layer imports these packages, so the
          # type-check needs the full stack installed, not just mypy.
          python -m pip install ruff -e ".[desktop,web,units,mcmc,typing]"

      - name: ruff
        run: ruff check .

      - name: mypy --strict (core layer)
        run: mypy --strict shared fitting extrapolation_methods datalab_latex

  lockfile:
    name: Lockfile in sync
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install uv
        # Pin to a major tag (the repo's other actions are SHA-pinned; swap this
        # for a resolved SHA when hardening the whole workflow).
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.6"

      # The committed uv.lock is the reproducibility pin (P2-1). Fail if it has
      # drifted from pyproject.toml so a dependency bump can't land unlocked.
      - name: uv lock --check
        run: uv lock --check
