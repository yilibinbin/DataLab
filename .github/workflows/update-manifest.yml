name: Generate signed update manifest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update, for example v2.7.10"
        required: true
        type: string
      version:
        description: "Release version without the leading v"
        required: true
        type: string
      min_client_version:
        description: "Minimum client version allowed to use installable updates"
        required: true
        default: "2.7.6"
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tooling
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Install signing dependency
        run: python -m pip install cryptography

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          DATALAB_RELEASE_TAG: ${{ inputs.tag }}
          DATALAB_RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$DATALAB_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "DataLab-${DATALAB_RELEASE_VERSION}-macOS.pkg" \
            --dir dist
          gh release download "$DATALAB_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "DataLab-${DATALAB_RELEASE_VERSION}-Windows-x64.exe" \
            --dir dist
          gh release view "$DATALAB_RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json body,publishedAt > release-metadata.json
          jq -r .body release-metadata.json > release-notes.md
          jq -r .publishedAt release-metadata.json > release-published-at.txt

      - name: Generate and verify updates.json
        env:
          DATALAB_RELEASE_TAG: ${{ inputs.tag }}
          DATALAB_RELEASE_VERSION: ${{ inputs.version }}
          DATALAB_UPDATE_MIN_CLIENT_VERSION: ${{ inputs.min_client_version }}
          DATALAB_UPDATE_SIGNING_PRIVATE_KEY_B64: ${{ secrets.DATALAB_UPDATE_SIGNING_PRIVATE_KEY_B64 }}
          DATALAB_UPDATE_SIGNING_KEY_ID: ${{ secrets.DATALAB_UPDATE_SIGNING_KEY_ID }}
          PYTHONPATH: .
        run: |
          set -euo pipefail
          published_at="$(cat release-published-at.txt)"
          test -n "$published_at"
          python tools/generate_updates_manifest.py \
            --version "$DATALAB_RELEASE_VERSION" \
            --release-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${DATALAB_RELEASE_TAG}" \
            --notes-file release-notes.md \
            --published-at "$published_at" \
            --min-client-version "$DATALAB_UPDATE_MIN_CLIENT_VERSION" \
            --macos-pkg "dist/DataLab-${DATALAB_RELEASE_VERSION}-macOS.pkg" \
            --windows-exe "dist/DataLab-${DATALAB_RELEASE_VERSION}-Windows-x64.exe" \
            --output dist/updates.json
          python - <<'PY'
          import json
          from pathlib import Path
          from shared.update_signing import verify_manifest_signature

          manifest = json.loads(Path("dist/updates.json").read_text(encoding="utf-8"))
          verify_manifest_signature(manifest)
          PY

      - name: Upload manifest to release
        env:
          GH_TOKEN: ${{ github.token }}
          DATALAB_RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$DATALAB_RELEASE_TAG" dist/updates.json \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
